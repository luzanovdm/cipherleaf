name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Never include a secret value, private age identity, or decrypted document.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, without sensitive values?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a synthetic document if a file is required.
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cipherleaf version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: input
    id: tools
    attributes:
      label: SOPS and age versions
      description: Copy only public version strings from Settings.
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive data check
      options:
        - label: I removed all secret values and private identity material.
          required: true
