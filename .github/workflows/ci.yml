name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install test dependencies
        run: brew install actionlint age ripgrep shellcheck sops xcodegen

      - name: Check shell scripts
        run: shellcheck Scripts/*.sh

      - name: Check GitHub Actions workflows
        run: actionlint .github/workflows/*.yml

      - name: Run architecture, format, unit, and integration checks
        run: Scripts/test.sh

      - name: Build unsigned review artifact
        run: Scripts/package.sh

      - name: Upload review artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Cipherleaf-unsigned
          path: .build/release/*.zip
          if-no-files-found: error
          retention-days: 14
